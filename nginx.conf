server {
    listen 80;
    server_name _;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Swagger UI
    location /v1/swagger/ {
        proxy_pass http://posto-prime_miau:8080/v1/swagger/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Proxy /v1/ — para N8N e chamadas externas
    location /v1/ {
        proxy_pass http://posto-prime_miau:8080/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type, apikey, Authorization";

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # Proxy via /api/ — usado pelo painel interno
    location /api/ {
        proxy_pass http://posto-prime_miau:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Remove CORS issues
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type, apikey, Authorization";

        if ($request_method = OPTIONS) {
            return 204;
        }
    }
}
